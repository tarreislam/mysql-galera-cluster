
services:
  mariadb:
    build: .
    container_name: mariadb
    network_mode: "host"
    volumes:
      - ./mariadb_data:/var/lib/mysql
  mariadb-new-cluster:
    build: .
    container_name: mariadb
    environment:
      MYSQL_ROLE: wsrep-new-cluster
    network_mode: "host"
    volumes:
      - ./mariadb_data:/var/lib/mysql
  mariadb-debug:
    build: .
    container_name: mariadb
    environment:
      MYSQL_ROLE: debug
    network_mode: "host"
    volumes:
      - ./mariadb_data:/var/lib/mysql